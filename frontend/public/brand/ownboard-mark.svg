<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="OwnBoard">
  <defs>
    <linearGradient id="ob-board" x1="8" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E9A01C"/>
      <stop offset="1" stop-color="#B85F18"/>
    </linearGradient>
  </defs>
  <!-- Soft board tile -->
  <rect width="64" height="64" rx="18" fill="url(#ob-board)"/>
  <!-- OwnBoard O — complete ring so it never collapses to an “e” -->
  <circle cx="30" cy="33" r="15.5" stroke="#fff" stroke-width="6.5" fill="none"/>
  <!-- Desk plank across the lower third of the O -->
  <rect x="18" y="36" width="24" height="5.5" rx="2.75" fill="#fff"/>
  <!-- Citation / verified seal -->
  <circle cx="46.5" cy="19.5" r="9" fill="#2A8A8E"/>
  <path d="M42.6 19.7 45.3 22.4 51 16.4" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
